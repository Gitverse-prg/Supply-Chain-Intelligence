{% extends "base.html" %}
{% block page_title %}Notification Center{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-start">
  <div>
    <h2><i class="fas fa-bell me-2 text-accent"></i>Notification Center</h2>
    <p>System alerts, early warnings, and event notifications</p>
  </div>
  <div class="d-flex gap-2">
    <select class="form-select form-select-sm" id="filter-status" onchange="loadAlerts()" style="width:150px">
      <option value="">All Status</option>
      <option value="unread">Unread</option>
      <option value="read">Read</option>
    </select>
    <button class="btn btn-sm btn-outline-accent" onclick="markAllRead()">Mark All Read</button>
  </div>
</div>
<div class="row g-3 mb-4" id="alert-stats-row"></div>
<div id="alerts-list"></div>
{% endblock %}
{% block scripts %}
<script>
async function loadAlerts() {
  const status = document.getElementById('filter-status').value;
  let url = '/api/alerts?limit=100';
  if (status) url += '&status=' + status;
  const alerts = await fetch(url).then(r=>r.json());

  // Stats
  const stats = await fetch('/api/alerts/stats').then(r=>r.json());
  document.getElementById('alert-stats-row').innerHTML = [
    {label:'Total Alerts',val:stats.total||0,icon:'fa-bell',cls:''},
    {label:'Unread',val:stats.unread||0,icon:'fa-envelope',cls:'warning'},
    {label:'Critical',val:stats.critical||0,icon:'fa-skull-crossbones',cls:'danger'},
    {label:'High Severity',val:stats.high||0,icon:'fa-exclamation-triangle',cls:''},
  ].map(s=>`
    <div class="col-md-3 col-6">
      <div class="stat-card ${s.cls}">
        <div class="stat-icon"><i class="fas ${s.icon}"></i></div>
        <div class="stat-value">${s.val}</div>
        <div class="stat-label">${s.label}</div>
      </div>
    </div>`).join('');

  document.getElementById('alerts-list').innerHTML = alerts.length ? alerts.map(a => `
    <div class="alert-item ${a.severity} ${a.status}" id="alert-${a.id}">
      <div class="d-flex justify-content-between align-items-start">
        <div class="d-flex gap-2 align-items-center">
          <span class="badge-severity sev-${a.severity}">${a.severity}</span>
          ${a.status==='unread'?'<span style="width:8px;height:8px;background:#0ea5e9;border-radius:50%;display:inline-block;"></span>':''}
          <b style="font-size:13px">${a.title}</b>
        </div>
        <div class="d-flex gap-1">
          ${a.status==='unread'?`<button class="btn btn-xs" style="font-size:10px;padding:2px 8px;border:1px solid #1e2d42;border-radius:4px;background:none;color:#94a3b8;" onclick="markRead(${a.id})">Mark Read</button>`:''}
          <button class="btn btn-xs" style="font-size:10px;padding:2px 8px;border:1px solid #1e2d42;border-radius:4px;background:none;color:#475569;" onclick="dismiss(${a.id})">Dismiss</button>
        </div>
      </div>
      <div style="font-size:12px;color:#64748b;margin-top:8px">${a.message||''}</div>
      <div class="meta mt-1" style="font-size:11px;color:#475569">
        ${a.alert_type||'system'} &nbsp;·&nbsp; ${a.country||'Global'} &nbsp;·&nbsp; ${fmtDate(a.created_at)}
      </div>
    </div>`).join('')
    : '<div class="text-center py-5 text-muted"><i class="fas fa-check-circle fa-2x d-block mb-3" style="color:#10b981;"></i>No alerts matching the current filter.</div>';
}

async function markRead(id) {
  await fetch(`/api/alerts/${id}/read`,{method:'POST'});
  loadAlerts(); loadGlobalStats();
}

async function dismiss(id) {
  await fetch(`/api/alerts/${id}/dismiss`,{method:'POST'});
  document.getElementById('alert-'+id)?.remove();
}

async function markAllRead() {
  const alerts = await fetch('/api/alerts?status=unread').then(r=>r.json());
  await Promise.all(alerts.map(a=>fetch(`/api/alerts/${a.id}/read`,{method:'POST'})));
  showToast('All alerts marked as read','success');
  loadAlerts(); loadGlobalStats();
}

loadAlerts();
</script>
{% endblock %}
